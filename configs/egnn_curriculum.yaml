model:
  name: egnn
  hidden_dim: 64
  n_layers: 4
  summary: true

data:
  train_path: data/output/scaling/train.h5
  val_path: data/output/scaling/val.h5
  dt: 0.05

training:
  batch_size: 128
  lr: 2.5e-5
  weight_decay: 1.0e-5
  loss: mse
  noise_factor: 0.03
  seed: 42
  device: auto
  multi_step_gamma: 0.8
  checkpoint_metric: rollout_score
  curriculum_horizons: [1, 2, 3, 5, 10, 20, 50, 100, 199]
  curriculum_epochs:   [8, 8, 8, 8, 8, 8, 6, 4, 2]

scheduler:
  enabled: true
  patience: 5
  factor: 0.5
  min_lr: 1.0e-6

checkpointing:
  enabled: true
  dir: checkpoints/egnn_curriculum/

logging:
  enabled: true
  dir: logs/egnn_curriculum/
