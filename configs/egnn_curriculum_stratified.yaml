model:
  name: egnn
  hidden_dim: 64
  n_layers: 4
  summary: true

data:
  train_path: data/output/stratified/train.h5
  val_path: data/output/stratified/val.h5
  dt: 0.05

training:
  batch_size: 128
  lr: 2.5e-5
  weight_decay: 1.0e-5
  loss: mse
  noise_factor: 0.03
  seed: 42
  device: auto
  multi_step_gamma: 0.8
  checkpoint_metric: bucket_macro_rollout_score
  curriculum_horizons:              [1,   2,   3,   5,   7,   10,  15,   20,  50,  100, 150, 199]
  curriculum_epochs:                [12,  8,   8,   8,   5,   5,   3,    3,   3,   3,   3,   3]
  curriculum_gradient_clip_norms:   [1.0, 1.0, 0.7, 0.5, 0.4, 0.3, 0.25, 0.2, 0.2, 0.2, 0.15, 0.15]
  gradient_clip_norm: 1.0
  skip_nonfinite_batches: true
  reset_optimizer_on_stage: true

scheduler:
  enabled: true
  patience: 5
  factor: 0.5
  min_lr: 1.0e-6

checkpointing:
  enabled: true
  dir: checkpoints/egnn_curriculum_stratified/

logging:
  enabled: true
  dir: logs/egnn_curriculum_stratified/
