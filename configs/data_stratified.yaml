train_path: data/output/stratified/train.h5
val_path: data/output/stratified/val.h5
test_path: data/output/stratified/test.h5

n_particles: 3
n_train: 10000
n_val: 600
n_test: 600
t_end: 10.0
dt: 0.05
G: 1.0
mass: 1.0
min_distance: 0.001
max_position: 5.0
pos_scale: 1.0
vel_scale: 0.5
seed: 42

stratified:
  enabled: true
  bins:
    - {name: extreme,    lo: 0.00, hi: 0.01}
    - {name: very_close, lo: 0.01, hi: 0.02}
    - {name: close,      lo: 0.02, hi: 0.05}
    - {name: moderate,   lo: 0.05, hi: 0.10}
    - {name: mild,       lo: 0.10, hi: 0.20}
    - {name: smooth,     lo: 0.20, hi: .inf}
  train_distribution:
    extreme:    10
    very_close: 15
    close:      25
    moderate:   25
    mild:       15
    smooth:     10
  val_distribution:
    extreme:    1
    very_close: 1
    close:      1
    moderate:   1
    mild:       1
    smooth:     1
  test_distribution:
    extreme:    1
    very_close: 1
    close:      1
    moderate:   1
    mild:       1
    smooth:     1
