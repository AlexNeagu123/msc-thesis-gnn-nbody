model:
  name: hgnn
  hidden_dim: 64
  n_layers: 4
  summary: true

data:
  train_path: data/output/scaling/train.h5
  val_path: data/output/scaling/val.h5
  dt: 0.05

training:
  batch_size: 128
  lr: 2.5e-4
  weight_decay: 1.0e-5
  loss: mse
  noise_factor: 0.03
  seed: 42
  device: auto
  multi_step_gamma: 1.0
  checkpoint_metric: rollout_score
  curriculum_horizons: [5, 10, 20]
  curriculum_epochs:   [2, 2, 1]

scheduler:
  enabled: true
  patience: 10
  factor: 0.5
  min_lr: 1.0e-6

checkpointing:
  enabled: true
  dir: checkpoints/hgnn_curriculum_stress/

logging:
  enabled: true
  dir: logs/hgnn_curriculum_stress/
