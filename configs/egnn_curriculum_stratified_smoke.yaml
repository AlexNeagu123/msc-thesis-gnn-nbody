model:
  name: egnn
  hidden_dim: 64
  n_layers: 4
  summary: false

data:
  train_path: data/output/stratified_smoke/train.h5
  val_path: data/output/stratified_smoke/val.h5
  dt: 0.05

training:
  epochs: 2
  multi_step_horizon: 1
  batch_size: 32
  lr: 2.5e-5
  weight_decay: 1.0e-5
  loss: mse
  noise_factor: 0.03
  seed: 42
  device: auto
  multi_step_gamma: 0.8
  checkpoint_metric: bucket_macro_rollout_score
  gradient_clip_norm: 1.0
  skip_nonfinite_batches: true
  reset_optimizer_on_stage: false

scheduler:
  enabled: false

checkpointing:
  enabled: true
  dir: checkpoints/egnn_curriculum_stratified_smoke/

logging:
  enabled: true
  dir: logs/egnn_curriculum_stratified_smoke/
