model:
  name: egnn
  hidden_dim: 64
  n_layers: 4
  summary: true

data:
  train_path: data/output/train.h5
  val_path: data/output/val.h5
  dt: 0.05

training:
  epochs: 500
  batch_size: 128
  lr: 5.0e-4
  weight_decay: 1.0e-5
  loss: mse
  noise_factor: 0.0
  seed: 42
  device: auto

scheduler:
  enabled: true
  patience: 50
  factor: 0.5
  min_lr: 1.0e-6

checkpointing:
  enabled: true
  dir: checkpoints/egnn/

logging:
  enabled: true
  dir: logs/egnn/
