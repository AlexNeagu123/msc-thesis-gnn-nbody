model:
  name: egnn
  hidden_dim: 64
  n_layers: 4
  summary: true

data:
  train_path: data/output/scaling/train.h5
  val_path: data/output/scaling/val.h5
  dt: 0.05

training:
  epochs: 10
  batch_size: 32
  lr: 5.0e-7
  weight_decay: 1.0e-5
  loss: mse
  noise_factor: 0.1
  multi_step_horizon: 50
  multi_step_gamma: 0.95
  seed: 42
  device: auto

scheduler:
  enabled: true
  patience: 50
  factor: 0.5
  min_lr: 1.0e-7

checkpointing:
  enabled: true
  dir: checkpoints/egnn_multistep_finetune_h50_nf0p1/

logging:
  enabled: true
  dir: logs/egnn_multistep_finetune_h50_nf0p1/
