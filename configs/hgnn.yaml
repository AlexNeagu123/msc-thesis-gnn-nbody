model:
  name: hgnn
  hidden_dim: 64
  n_layers: 4
  summary: true

data:
  train_path: data/output/train.h5
  val_path: data/output/val.h5
  dt: 0.05

training:
  batch_size: 128
  lr: 2.5e-4
  weight_decay: 1.0e-5
  loss: mse
  noise_factor: 0.0
  seed: 42
  device: auto
  multi_step_gamma: 1.0
  checkpoint_metric: bucket_macro_rollout_score
  curriculum_horizons: [1,      5,      10,     20,     50,     100,    150,    199]
  curriculum_epochs:   [5,      5,      5,      3,      3,      3,      3,      3]
  curriculum_lrs:      [2.5e-4, 2.0e-4, 1.5e-4, 1.0e-4, 7.5e-5, 5.0e-5, 2.5e-5, 1.0e-5]
  gradient_clip_norm: 1.0
  skip_nonfinite_batches: true
  reset_optimizer_on_stage: false

scheduler:
  enabled: true
  patience: 10
  factor: 0.5
  min_lr: 1.0e-6

checkpointing:
  enabled: true
  dir: runs/hgnn/

logging:
  enabled: true
  dir: runs/hgnn/
